version: "3.9"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_dev_password
      MYSQL_DATABASE: sentinelview
      MYSQL_USER: sentinel
      MYSQL_PASSWORD: sentinel_dev_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_dev_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: sentinel
      MYSQL_PASSWORD: sentinel_dev_password
      MYSQL_DB: sentinelview
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-to-a-long-random-string}
      INGEST_API_KEY: ${INGEST_API_KEY:-change-me-shared-secret}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:8080"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api/v1
        VITE_WS_URL: ws://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

  # Optional one-shot job: populates realistic demo data (see backend/scripts/seed_demo_data.py)
  # Run with: docker compose --profile demo up seed
  seed:
    build: ./backend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: sentinel
      MYSQL_PASSWORD: sentinel_dev_password
      MYSQL_DB: sentinelview
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["python", "-m", "scripts.seed_demo_data"]
    profiles: ["demo"]

volumes:
  mysql_data:
